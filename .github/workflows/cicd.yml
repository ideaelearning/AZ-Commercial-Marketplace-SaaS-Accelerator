# Build + deploy the SaaS Accelerator to the Azure test environment.
#
# Auth: passwordless OIDC (federated credentials) — NO secrets/publish profiles.
# Set these three NON-SECRET GitHub repository VARIABLES (Settings → Secrets and
# variables → Actions → Variables):
#   AZURE_CLIENT_ID         (the github-saas-accelerator-deploy app)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# This workflow deploys only. The database schema is managed out-of-band (the
# accelerator's EF migrations); CI never holds DB credentials. To apply a schema
# change, run the migration command documented in docs/azure-test-env.md.

name: Deploy to Azure (test)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC azure/login
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  CUSTOMER_PROJECT: ./src/CustomerSite/CustomerSite.csproj
  ADMIN_PROJECT: ./src/AdminSite/AdminSite.csproj
  CUSTOMER_APP_NAME: app-saasacc-customer-1c734f
  ADMIN_APP_NAME: app-saasacc-admin-1c734f

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish CustomerSite
        run: dotnet publish ${{ env.CUSTOMER_PROJECT }} -c Release -o ./publish-customer

      - name: Publish AdminSite
        run: dotnet publish ${{ env.ADMIN_PROJECT }} -c Release -o ./publish-admin

      - name: Azure login (OIDC, passwordless)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy CustomerSite
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.CUSTOMER_APP_NAME }}
          package: ./publish-customer

      - name: Deploy AdminSite
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.ADMIN_APP_NAME }}
          package: ./publish-admin

      - name: Azure logout
        if: always()
        run: az logout || true
